<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.TopicName}} - DailyDocs</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2933;
      background: #f7f8fa;
    }
    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      box-sizing: border-box;
    }
    article {
      width: min(42rem, 100%);
    }
    article a.reading-link {
      display: block;
      color: inherit;
      text-decoration: none;
    }
    article a.reading-link:hover h2,
    article a.reading-link:focus h2 {
      text-decoration: underline;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.14em;
    }
    .date {
      margin: 0 0 0.5rem;
      color: #52606d;
      font-size: 0.95rem;
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(2.25rem, 7vw, 4.5rem);
      line-height: 1;
    }
    h2 {
      margin: 0 0 1rem;
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      line-height: 1.15;
    }
    p {
      margin: 0 0 1.5rem;
      color: #52606d;
      font-size: 1.05rem;
      line-height: 1.6;
    }
    .badge {
      display: inline-block;
      margin-left: 0.5rem;
      font-size: 0.85rem;
      color: #1f2933;
    }
    .button {
      display: inline-block;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      color: #ffffff;
      background: #1f2933;
      text-decoration: none;
    }
    .home-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: #52606d;
    }
  </style>
</head>
<body>
  <main>
    <article>
      <a class="reading-link" href="{{.URL}}">
        <p class="date">{{.Date}}</p>
        <h1>{{.TopicName}}</h1>
        <h2>{{.Title}}</h2>
        <p>
          {{if .Source}}{{.Source}}{{else}}Documentation{{end}}
          {{if .Official}}<span class="badge">Official</span>{{end}}
          {{if .EstimatedMinutes}}<br>{{.EstimatedMinutes}} min{{end}}
        </p>
        <span class="button">Read</span>
      </a>
      <a class="home-link" href="/">Home</a>
    </article>
  </main>
</body>
</html>
