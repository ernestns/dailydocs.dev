<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Name}} - DailyDocs</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2933;
      background: #f7f8fa;
    }
    main {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      box-sizing: border-box;
    }
    section {
      width: min(42rem, 100%);
    }
    .status {
      margin: 0 0 0.5rem;
      color: #52606d;
      font-size: 0.95rem;
      text-transform: capitalize;
    }
    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2.25rem, 7vw, 4.5rem);
      line-height: 1;
    }
    p {
      margin: 0 0 1.5rem;
      color: #52606d;
      font-size: 1.05rem;
      line-height: 1.6;
    }
    form {
      margin: 0 0 1.5rem;
    }
    button {
      padding: 0.75rem 1rem;
      border: 0;
      border-radius: 6px;
      font: inherit;
      color: #ffffff;
      background: #1f2933;
      cursor: pointer;
    }
    a {
      color: #1f2933;
    }
  </style>
</head>
<body>
  <main>
    <section>
      <p class="status">{{.Status}}</p>
      <h1>{{.Name}}</h1>
      <p>This topic is queued. DailyDocs can process up to 20 requested topics per day.</p>
      {{if eq .Status "queued"}}
      <form method="post" action="/process-topic">
        <input type="hidden" name="topic" value="{{.Slug}}">
        <button type="submit">Process topic</button>
      </form>
      {{end}}
      <p><a href="/">Search another topic</a> · <a href="/topics">All topics</a></p>
    </section>
  </main>
</body>
</html>
