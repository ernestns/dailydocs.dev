<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Topics - DailyDocs</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2933;
      background: #f7f8fa;
    }
    main {
      width: min(42rem, 100%);
      margin: 0 auto;
      padding: 2rem;
      box-sizing: border-box;
    }
    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2rem, 7vw, 4rem);
      line-height: 1;
    }
    ul {
      margin: 0 0 1.5rem;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 0.65rem;
    }
    table {
      width: 100%;
      margin: 0 0 1.5rem;
      border-collapse: collapse;
      background: #ffffff;
    }
    th,
    td {
      padding: 0.75rem;
      border-bottom: 1px solid #d9e2ec;
      text-align: left;
      vertical-align: top;
    }
    th {
      color: #52606d;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .status {
      text-transform: capitalize;
    }
    a {
      color: #1f2933;
    }
    p {
      margin: 0;
      color: #52606d;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>Topics</h1>
    {{if .Topics}}
    <table>
      <thead>
        <tr>
          <th>Topic</th>
          <th>Status</th>
          <th>Accepted</th>
          <th>Evaluated</th>
        </tr>
      </thead>
      <tbody>
        {{range .Topics}}
        <tr>
          <td>
            <a href="/{{.Slug}}">{{.Name}}</a>
          </td>
          <td class="status">{{.StatusLabel}}</td>
          <td><a href="/topics/{{.Slug}}/evaluations">{{.AcceptedCount}}</a></td>
          <td><a href="/topics/{{.Slug}}/evaluations">{{.EvaluatedCount}}</a></td>
        </tr>
        {{end}}
      </tbody>
    </table>
    {{else}}
    <p>No topics yet.</p>
    {{end}}
    <p><a href="/">Home</a></p>
  </main>
</body>
</html>
